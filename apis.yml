description: >-
  Temple University Health System (Temple Health) is the Philadelphia-based academic health system affiliated with the
  Lewis Katz School of Medicine at Temple University. It operates Temple University Hospital (Main Campus, Jeanes,
  Episcopal, Northeastern, Women & Families), Temple Health Chestnut Hill Hospital, Fox Chase Cancer Center, and
  outpatient sites across the Philadelphia region. Its patient-facing electronic health record runs on Epic, branded
  myTempleHealth (MyChart), with CMS-mandated HL7 FHIR APIs published at
  epicaccess.templehealth.org/FhirProxyPrd/api/FHIR/R4 (and a legacy DSTU2 endpoint at the same host) that expose
  USCDI-aligned clinical resources to third-party patient-access applications via SMART on FHIR and OAuth 2.0. Temple
  Health does not publish a separate commercial developer program; its API surface is regulatory-mandated and free at
  point of use.
