apis:
  - aid: temple-health:temple-health-fhir-r4-api
    name: Temple Health FHIR R4 API
    tags:
      - CMS Interoperability
      - Cures Act
      - Epic
      - FHIR
      - HL7
      - Patient Access
      - R4
      - SMART on FHIR
      - US Core
      - USCDI
    humanURL: https://epicaccess.templehealth.org/FhirProxyPrd/api/FHIR/R4
    baseURL: https://epicaccess.templehealth.org/FhirProxyPrd/api/FHIR/R4
    description: >-
      The Temple Health FHIR R4 API is Temple University Health System's CMS Interoperability and Patient Access
      (CMS-9115-F) compliant HL7 FHIR Release 4.0.1 endpoint powered by Epic's August 2025 release. It is listed in
      Epic's public R4 endpoint registry under the organization "TempleHealth" and exposes USCDI-aligned clinical
      resources — including Patient, Observation, Condition, Encounter, MedicationRequest, AllergyIntolerance,
      DiagnosticReport, DocumentReference, Procedure, Immunization, and AllergyIntolerance — to third-party
      patient-access applications using SMART on FHIR and OAuth 2.0 with standalone-patient and EHR launch contexts. The
      same endpoint covers the Temple University Hospital campuses (Main, Jeanes, Episcopal, Northeastern, Women &
      Families), Temple Health Chestnut Hill Hospital, and Fox Chase Cancer Center under one Epic instance. Both XML and
      JSON FHIR payloads are supported.
    properties:
      - type: CapabilityStatement
        url: https://epicaccess.templehealth.org/FhirProxyPrd/api/FHIR/R4/metadata
      - type: SmartConfiguration
        url: https://epicaccess.templehealth.org/FhirProxyPrd/api/FHIR/R4/.well-known/smart-configuration
      - type: Authorization
        url: https://epicaccess.templehealth.org/FhirProxyPrd/oauth2/authorize
      - type: Token
        url: https://epicaccess.templehealth.org/FhirProxyPrd/oauth2/token
      - type: Documentation
        url: https://fhir.epic.com/Documentation
      - type: AppRegistration
        url: https://fhir.epic.com/Developer/Apps
      - type: DeveloperPortal
        url: https://fhir.epic.com/
      - type: EndpointDirectory
        url: https://open.epic.com/Endpoints/R4
      - type: ImplementationGuide
        name: HL7 US Core 6.1.0
        url: https://hl7.org/fhir/us/core/STU6.1/
      - type: ImplementationGuide
        name: HL7 SMART App Launch
        url: https://hl7.org/fhir/smart-app-launch/
      - type: ImplementationGuide
        name: HL7 FHIR Bulk Data Access
        url: https://hl7.org/fhir/uv/bulkdata/
      - type: OpenAPI
        url: openapi/temple-health-temple-health-fhir-r4-api-openapi.yml
      - type: SpectralRuleset
        url: rules/temple-health-temple-health-fhir-r4-rules.yml
  - aid: temple-health:temple-health-fhir-dstu2-api
    name: Temple Health FHIR DSTU2 API
    tags:
      - DSTU2
      - Epic
      - FHIR
      - Legacy
      - SMART on FHIR
    humanURL: https://epicaccess.templehealth.org/FhirProxyPrd/api/FHIR/DSTU2/
    baseURL: https://epicaccess.templehealth.org/FhirProxyPrd/api/FHIR/DSTU2
    description: >-
      The legacy Temple Health DSTU2 FHIR endpoint listed in Epic's public DSTU2 endpoint registry under the
      organization "TempleHealth". It remains available for backward compatibility with older SMART on FHIR apps written
      against the FHIR DSTU2 (1.0.2) baseline that pre-dates the CMS Interoperability and Patient Access mandate; new
      integrations should target the R4 endpoint instead. Supported resources include AllergyIntolerance, Binary,
      CarePlan, Condition, Device, DiagnosticReport, DocumentReference, FamilyMemberHistory, Goal, Immunization,
      Medication, MedicationOrder, MedicationStatement, Observation, Patient, Practitioner, and Procedure.
    properties:
      - type: CapabilityStatement
        url: https://epicaccess.templehealth.org/FhirProxyPrd/api/FHIR/DSTU2/metadata
      - type: Authorization
        url: https://epicaccess.templehealth.org/FhirProxyPrd/oauth2/authorize
      - type: Token
        url: https://epicaccess.templehealth.org/FhirProxyPrd/oauth2/token
      - type: Documentation
        url: https://fhir.epic.com/Specifications
      - type: EndpointDirectory
        url: https://open.epic.com/Endpoints/DSTU2
  - aid: temple-health:mytemplehealth-mychart
    name: myTempleHealth MyChart Patient Portal
    tags:
      - Epic
      - MyChart
      - Patient Portal
    humanURL: https://my.templehealth.org/MyChartPRD/Authentication/Login
    baseURL: https://my.templehealth.org/MyChartPRD/
    description: >-
      myTempleHealth is the patient-facing Epic MyChart deployment used by Temple Health patients to view test results,
      message providers, request prescription renewals, schedule appointments, pay bills, and grant third-party
      patient-access apps consent to retrieve their data through Temple Health's underlying FHIR R4 API.
    properties:
      - type: PatientPortal
        url: https://my.templehealth.org/MyChartPRD/Authentication/Login
      - type: Vendor
        name: Epic Systems MyChart
        url: https://www.epic.com/software/mychart/
