naftiko: 1.0.0-alpha2
info:
  label: Temple Health FHIR R4 — Allergy Intolerance
  description: Search AllergyIntolerance resources for a patient on Temple Health's Epic FHIR R4 endpoint.
  tags:
  - Temple Health
  - Epic
  - FHIR
  - AllergyIntolerance
  - USCDI
  created: '2026-05-23'
  modified: '2026-05-23'
binds:
- namespace: env
  keys:
    TEMPLE_HEALTH_FHIR_TOKEN: TEMPLE_HEALTH_FHIR_TOKEN
capability:
  consumes:
  - type: http
    namespace: temple-health-fhir-r4-allergy-intolerance
    baseUri: https://epicaccess.templehealth.org/FhirProxyPrd/api/FHIR/R4
    resources:
    - name: AllergyIntolerance
      path: /AllergyIntolerance
      operations:
      - name: searchAllergyIntolerance
        method: GET
        description: Search AllergyIntolerance resources for a patient.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: patient
          in: query
          type: string
        - name: clinical-status
          in: query
          type: string
    authentication:
      type: bearer
      token: '{{env.TEMPLE_HEALTH_FHIR_TOKEN}}'
  exposes:
  - type: rest
    namespace: temple-health-fhir-r4-allergy-intolerance-rest
    port: 8080
    resources:
    - path: /v1/allergy-intolerance
      name: allergy-intolerance
      operations:
      - method: GET
        name: searchAllergyIntolerance
        call: temple-health-fhir-r4-allergy-intolerance.searchAllergyIntolerance
        with:
          patient: rest.patient
          clinical-status: rest.clinical_status
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: temple-health-fhir-r4-allergy-intolerance-mcp
    port: 9090
    transport: http
    tools:
    - name: search-allergy-intolerance
      description: Search AllergyIntolerance on Temple Health FHIR R4.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: temple-health-fhir-r4-allergy-intolerance.searchAllergyIntolerance
      with:
        patient: tool.patient
        clinical-status: tool.clinical_status
