naftiko: 1.0.0-alpha2
info:
  label: Temple Health FHIR R4 — Observation
  description: Search Observation resources (labs, vitals, smoking status) for a patient on Temple Health's Epic FHIR R4 endpoint.
  tags:
  - Temple Health
  - Epic
  - FHIR
  - Observation
  - USCDI
  created: '2026-05-23'
  modified: '2026-05-23'
binds:
- namespace: env
  keys:
    TEMPLE_HEALTH_FHIR_TOKEN: TEMPLE_HEALTH_FHIR_TOKEN
capability:
  consumes:
  - type: http
    namespace: temple-health-fhir-r4-observation
    baseUri: https://epicaccess.templehealth.org/FhirProxyPrd/api/FHIR/R4
    resources:
    - name: Observation
      path: /Observation
      operations:
      - name: searchObservation
        method: GET
        description: Search Observation resources for a patient.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: patient
          in: query
          type: string
          description: Reference to the Patient.
        - name: category
          in: query
          type: string
          description: US Core category (laboratory, vital-signs, social-history, smoking-status, survey).
        - name: code
          in: query
          type: string
          description: LOINC or SNOMED CT code.
        - name: date
          in: query
          type: string
          description: Observation effective date.
    authentication:
      type: bearer
      token: '{{env.TEMPLE_HEALTH_FHIR_TOKEN}}'
  exposes:
  - type: rest
    namespace: temple-health-fhir-r4-observation-rest
    port: 8080
    resources:
    - path: /v1/observation
      name: observation
      operations:
      - method: GET
        name: searchObservation
        call: temple-health-fhir-r4-observation.searchObservation
        with:
          patient: rest.patient
          category: rest.category
          code: rest.code
          date: rest.date
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: temple-health-fhir-r4-observation-mcp
    port: 9090
    transport: http
    tools:
    - name: search-observation
      description: Search Observation on Temple Health FHIR R4.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: temple-health-fhir-r4-observation.searchObservation
      with:
        patient: tool.patient
        category: tool.category
        code: tool.code
        date: tool.date
